
<header class="w-full shadow-md bg-mint-dark/70 backdrop-blur-sm">
  <div class="px-6 py-4 max-w-6xl mx-auto flex justify-between items-center">
    <h1 class="font-semibold text-xl text-forest-dark font-mono">
      Movie App
    </h1>
    <div class="flex gap-4">
      <button (click)="navigateToLogin()" class="px-4 py-2 border-2 border-gray-300 border-mint text-forest-dark rounded-lg hover:bg-lavender/50 font-mono transition"  >
        Login
      </button>
      <button (click)="navigateToRegister()" class="px-4 py-2 bg-white/30 border-2 border-mint border-gray-300 text-forest-dark rounded-lg hover:bg-lavender/50 font-mono italic transition" >
        Signup
      </button>
    </div>
    
  </div>
</header>
<div class="p-6 bg-lavender-dark">
  <header class="border-4 border-lime-dark rounded-xl p-4 bg-mint shadow-med max-w-5xl mx-auto">
    <div class="flex flex-col items-center text-center  ">
      <h1 class="my-4 text-6xl text-forest-dark font-mono font-bold ">
        🎬 Film Arama Motoru</h1>
      <p class="mr-72 mb-2 italic text-forest-dark text-md ">Milyonlarca filmi keşfedin</p>
    </div>
  </header>

  <div >
    <div>
      <div class="flex justify-center px-4 mt-10 ">
        <span class="px-2 py-4 ">🔍</span>
        <input
          #myInput
          (input)="onSearch(myInput.value)"
          type="text"
          placeholder="Film adı yazın... (örn: The Matrix, Inception)"
          class=" bg-mint text-lg text-mint-dark w-full max-w-md px-4 py-2 border rounded-lg 
          italic border-2 border-lime focus:outline-none focus:ring-2  
          hover:border-sage "
          
        />
      </div>
      <p class=" p-2 flex justify-center text-lavender text-sm  font-bold italic">En sevdiğiniz filmleri arayın ve keşfedin</p>
    </div>
  </div>

  <main>
    <app-movie-list></app-movie-list>
  </main>

  <footer>
    <p>Film verileri IMDB API'den alınmaktadır</p>
    <p>© 2026 Film Arama Uygulaması</p>
  </footer>
</div>
