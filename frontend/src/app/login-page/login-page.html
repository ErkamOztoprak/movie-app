<section class="bg-forest-dark min-h-screen">
    <div class="flex items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
        <div class="w-full sm:max-w-md p-6 bg-mint rounded-lg shadow">
            <a href="" class="text-forest font-bold text-xl mb-4 inline-block">
                Logo
            </a>
            <h1 class="text-2xl font-semibold text-forest mb-4">
                Login
            </h1>
            <form class="space-y-4 md:space-y-6" action="">
                <div>
                    <label class="block text-sm font-medium text-forest mb-1" for="email">Your email</label>
                    <input id="email" name="email" type="email" required class="w-full p-2 rounded border border-sage bg-white text-forest placeholder-sage focus:outline-none focus:ring-2 focus:ring-lavender" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-forest mb-1" for="password">Password</label>
                    <input id="password" name="password" type="password" required class="w-full p-2 rounded border border-sage bg-white text-forest placeholder-sage focus:outline-none focus:ring-2 focus:ring-lavender" />
                </div>
                
                <div>
                    <button type="submit" class="w-full py-2 rounded bg-forest text-mint font-semibold hover:bg-sage ">Login</button>
                </div>
            </form>
        </div>
    </div>
</section>
